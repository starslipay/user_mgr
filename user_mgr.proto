syntax = "proto3";

package user_mgr;
// 相对路径;包名
option go_package = "./user_mgr_pb";

// 注册用户Req
message RegUserReq {
    string user_id = 1;
    string password = 2;
    string name = 3;
    int32 gender = 5;
    int32 age = 4;
    string address = 6;
    string phone = 7;
    string email = 8;
    int32 id_type = 9;
    string id_card = 10;
}

message GetRelationReq {
    string user_id = 1;
}

message GetRelationRsp {
    string user_id = 1;
    int64 uid = 2;
}

// 注册用户Rsp
message RegUserRsp {
    string user_id = 1;
}

message GetUserInfoReq {
    string user_id = 1;
}

message GetUserInfoRsp {
    string user_id = 1;
    string name = 2;
    int32 gender = 3;
    int32 age = 4;
    string address = 5;
    string phone = 6;
    string email = 7;
    int32 id_type = 8;
    string id_card = 9;
    int64 uid = 10;
}

// 更新用户信息
message UpdateUserInfoReq {
    string user_id = 1;
    string name = 2;
    int32 gender = 3;
    int32 age = 4;
    string address = 5;
    string phone = 6;
    string email = 7;
    int32 id_type = 8;
    string id_card = 9;
}

message UpdateUserInfoRsp {
    string user_id = 1;
}

message CheckPasswordReq {
    string user_id = 1;
    string password = 2;
}

message CheckPasswordRsp {
}

message GetUserTokenReq {
    string user_id = 1;
    string password = 2;
    string business_info = 3;  // 业务信息, 会参生成token
}

message GetUserTokenRsp {
    string user_token = 1;
}

service UserMgr {
    rpc RegUser(RegUserReq) returns (RegUserRsp);
    rpc UpdateUserInfo(UpdateUserInfoReq) returns (UpdateUserInfoRsp);
    rpc GetRelation(GetRelationReq) returns (GetRelationRsp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRsp);
    rpc CheckPassword(CheckPasswordReq) returns (CheckPasswordRsp);
    rpc GetUserToken(GetUserTokenReq) returns (GetUserTokenRsp);
}
