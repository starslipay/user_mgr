syntax = "proto3";

package user_mgr;
// 相对路径;包名
option go_package = "./user_mgr_pb";

// 注册用户Req
message RegUserReq {
    string user_id = 1;
    string password = 2;
    string name = 3;
    int32 gender = 5;
    int32 age = 4;
    string address = 6;
    string phone = 7;
    string email = 8;
    int32 id_type = 9;
    string id_card = 10;
}

// 注册用户Rsp
message RegUserRsp {
    string user_id = 1;
}

message GetUserInfoReq {
    string user_id = 1;
}

message GetUserInfoRsp {
    string user_id = 1;
    string name = 2;
    int32 gender = 3;
    int32 age = 4;
    string address = 5;
    string phone = 6;
    string email = 7;
    int32 id_type = 8;
    string id_card = 9;
}

// 更新用户信息
message UpdateUserInfoReq {
    string user_id = 1;
    string name = 2;
    int32 gender = 3;
    int32 age = 4;
    string address = 5;
    string phone = 6;
    string email = 7;
    int32 id_type = 8;
    string id_card = 9;
}

message UpdateUserInfoRsp {
    string user_id = 1;
}

message CheckPasswordReq {
    string user_id = 1;
    string password = 2;
}

message CheckPasswordRsp {
    int32 check_result = 1;
}

service UserMgr {
    rpc RegUser(RegUserReq) returns (RegUserRsp);
    rpc UpdateUserInfo(UpdateUserInfoReq) returns (UpdateUserInfoRsp);
    rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoRsp);
    rpc CheckPassword(CheckPasswordReq) returns (CheckPasswordRsp);
}

/*
生成项目框架
goctl rpc protoc user_mgr.proto --go_out=. --go-grpc_out=. --zrpc_out=.
*/